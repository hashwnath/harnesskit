<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Brain: Agent Knowledge Graph</title>
  
  <!-- Vis.js Network -->
  <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

  <style>
    :root {
      --bg: #0f172a; /* Slate 900 */
      --text: #f8fafc; /* Slate 50 */
      --primary: #3b82f6; /* Blue 500 */
      --card-bg: #1e293b; /* Slate 800 */
      --border: #334155; /* Slate 700 */
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 1.5rem 2rem;
      background-color: var(--card-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 600;
      background: linear-gradient(to right, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .badge {
      background: rgba(59, 130, 246, 0.2);
      color: #93c5fd;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 500;
      border: 1px solid rgba(59, 130, 246, 0.4);
    }

    #graph-container {
      flex: 1;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
    }

    .panel {
      position: absolute;
      top: 5rem;
      right: 2rem;
      width: 320px;
      background: rgba(30, 41, 59, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      z-index: 20;
      transition: opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
    }

    .panel.active {
      opacity: 1;
      pointer-events: auto;
    }

    .panel h2 {
      margin-top: 0;
      font-size: 1.25rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.75rem;
      margin-bottom: 1rem;
    }

    .panel p {
      font-size: 0.9rem;
      line-height: 1.5;
      color: #cbd5e1; /* Slate 300 */
      margin-bottom: 1rem;
    }

    .controls {
      position: absolute;
      bottom: 2rem;
      left: 2rem;
      display: flex;
      gap: 0.5rem;
      z-index: 10;
    }

    button {
      background: var(--card-bg);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    button:hover {
      background: #334155;
      border-color: #475569;
    }
  </style>
</head>
<body>

  <header>
    <h1>🧠 Agent Knowledge Graph</h1>
    <div class="badge">Project: harnesskit</div>
  </header>

  <div id="graph-container"></div>

  <div class="panel" id="info-panel">
    <h2 id="node-title">Node Name</h2>
    <p id="node-desc">Click on a node to view its details and role within the agentic architecture.</p>
  </div>

  <div class="controls">
    <button onclick="network.fit({ animation: true })">⛶ Fit View</button>
  </div>

  <script>
    // ─── Colors configuration ──────────────────────────────
    const colors = {
      human: { background: '#8b5cf6', border: '#7c3aed', highlight: { background: '#a78bfa', border: '#8b5cf6' } }, // Purple
      agent: { background: '#3b82f6', border: '#2563eb', highlight: { background: '#60a5fa', border: '#3b82f6' } }, // Blue
      file: { background: '#10b981', border: '#059669', highlight: { background: '#34d399', border: '#10b981' } },  // Green
      code: { background: '#64748b', border: '#475569', highlight: { background: '#94a3b8', border: '#64748b' } },  // Slate
      layer: { background: '#f59e0b', border: '#d97706', highlight: { background: '#fbbf24', border: '#f59e0b' } }  // Amber
    };

    // ─── Data: Nodes ───────────────────────────────────────
    const nodes = new vis.DataSet([
      // Humans
      { id: 'user', label: '🧑‍💻 You (Dev)', shape: 'hexagon', color: colors.human, size: 30, font: { color: 'white', size: 16 }, desc: 'The orchestrator. You write prompts, guide the Planner, and ultimately approve pull requests.' },
      
      // Agents
      { id: 'planner', label: '🧭 Planner Agent', shape: 'dot', color: colors.agent, size: 25, font: { color: 'white' }, desc: 'Analyzes your request and breaks it into an actionable Markdown execution plan for the Implementer.' },
      { id: 'implementer', label: '🛠️ Implementer Agent', shape: 'dot', color: colors.agent, size: 25, font: { color: 'white' }, desc: 'Writes the code based on the execution plan, strictly adhering to layer boundaries.' },
      { id: 'arch_reviewer', label: '🏛️ Architecture Reviewer', shape: 'dot', color: colors.agent, size: 20, font: { color: 'white' }, desc: 'Reviews code to ensure it does not violate imports or architectural boundaries.' },
      { id: 'sec_reviewer', label: '🔐 Security Reviewer', shape: 'dot', color: colors.agent, size: 20, font: { color: 'white' }, desc: 'Analyzes authentication, cryptography, and data handling.' },
      { id: 'gen_reviewer', label: '🕵️ General Reviewer', shape: 'dot', color: colors.agent, size: 20, font: { color: 'white' }, desc: 'Reviews overall code quality, test coverage, and catches edge cases.' },
      
      // Configuration & Docs Files
      { id: 'agents_md', label: '📄 AGENTS.md', shape: 'box', color: colors.file, font: { color: 'white' }, desc: 'The universal entry point and table of contents for all agents. Defines the repository workflow.' },
      { id: 'arch_md', label: '🏛️ docs/ARCHITECTURE.md', shape: 'box', color: colors.file, font: { color: 'white' }, desc: 'Defines the structural layers of the project (e.g., API -> Services -> Config).' },
      { id: 'sec_md', label: '🔐 docs/SECURITY.md', shape: 'box', color: colors.file, font: { color: 'white' }, desc: 'Defines data classification and security posture for the project.' },
      { id: 'qual_md', label: '✨ docs/QUALITY_SCORE.md', shape: 'box', color: colors.file, font: { color: 'white' }, desc: 'Outlines the expected grades for testing and stability.' },
      { id: 'plans', label: '📋 docs/exec-plans/*', shape: 'box', color: colors.file, font: { color: 'white' }, desc: 'A folder for temporary step-by-step markdown plans generated by the Planner.' },
      { id: 'beliefs', label: '💡 design-docs/*', shape: 'box', color: colors.file, font: { color: 'white' }, desc: 'Core engineering beliefs and historical design decisions.' },

      // System
      { id: 'codebase', label: '💻 The Codebase', shape: 'database', color: colors.code, size: 40, font: { color: 'white', size: 18 }, desc: 'The actual project source code being manipulated and reviewed.' },
      { id: 'ci', label: '🤖 CI Enforcer', shape: 'diamond', color: colors.layer, size: 20, font: { color: 'white' }, desc: "Mechanical validation running 'npx harnesskit enforce' on PRs." }
    ]);

    // ─── Data: Edges ───────────────────────────────────────
    const edges = new vis.DataSet([
      // Workflow
      { from: 'user', to: 'planner', label: 'Prompts', arrows: 'to', color: { color: '#94a3b8' }, font: { color: '#94a3b8', strokeWidth: 0 } },
      { from: 'planner', to: 'plans', label: 'Creates', arrows: 'to', color: { color: '#94a3b8' }, font: { color: '#94a3b8', strokeWidth: 0 }, dashes: true },
      { from: 'planner', to: 'implementer', label: 'Hands off', arrows: 'to', color: { color: '#94a3b8' }, font: { color: '#94a3b8', strokeWidth: 0 } },
      
      // Reading Context
      { from: 'implementer', to: 'agents_md', label: 'Reads', arrows: 'to', color: { color: '#475569' }, font: { color: '#475569', strokeWidth: 0 } },
      { from: 'implementer', to: 'plans', label: 'Executes', arrows: 'to', color: { color: '#475569' }, font: { color: '#475569', strokeWidth: 0 } },
      { from: 'planner', to: 'beliefs', label: 'Context', arrows: 'to', color: { color: '#475569' }, font: { color: '#475569', strokeWidth: 0 } },

      // Action on codebase
      { from: 'implementer', to: 'codebase', label: 'Modifies', arrows: 'to', color: { color: '#3b82f6', opacity: 0.8 }, font: { color: '#60a5fa', strokeWidth: 0 }, width: 2 },

      // Reviewing Process
      { from: 'codebase', to: 'arch_reviewer', label: 'PR Review', arrows: 'to', color: { color: '#cbd5e1' }, font: { color: '#cbd5e1', strokeWidth: 0 } },
      { from: 'codebase', to: 'sec_reviewer', label: 'PR Review', arrows: 'to', color: { color: '#cbd5e1' }, font: { color: '#cbd5e1', strokeWidth: 0 } },
      { from: 'codebase', to: 'gen_reviewer', label: 'PR Review', arrows: 'to', color: { color: '#cbd5e1' }, font: { color: '#cbd5e1', strokeWidth: 0 } },

      // Feedback loops
      { from: 'arch_reviewer', to: 'implementer', label: 'Rejects/Fix', arrows: 'to', color: { color: '#ef4444' }, font: { color: '#f87171', strokeWidth: 0 }, dashes: true },
      { from: 'sec_reviewer', to: 'implementer', label: 'Rejects/Fix', arrows: 'to', color: { color: '#ef4444' }, font: { color: '#f87171', strokeWidth: 0 }, dashes: true },
      { from: 'gen_reviewer', to: 'implementer', label: 'Rejects/Fix', arrows: 'to', color: { color: '#ef4444' }, font: { color: '#f87171', strokeWidth: 0 }, dashes: true },

      // Enforcement Rules
      { from: 'arch_reviewer', to: 'arch_md', label: 'Enforces', arrows: 'to', color: { color: '#10b981' }, font: { color: '#34d399', strokeWidth: 0 }, width: 2 },
      { from: 'sec_reviewer', to: 'sec_md', label: 'Enforces', arrows: 'to', color: { color: '#10b981' }, font: { color: '#34d399', strokeWidth: 0 }, width: 2 },
      { from: 'gen_reviewer', to: 'qual_md', label: 'Enforces', arrows: 'to', color: { color: '#10b981' }, font: { color: '#34d399', strokeWidth: 0 }, width: 2 },

      // CI Validation
      { from: 'ci', to: 'codebase', label: 'Validates', arrows: 'to', color: { color: '#f59e0b' }, font: { color: '#fbbf24', strokeWidth: 0 } },
      { from: 'ci', to: 'arch_md', label: 'Reads Rules', arrows: 'from', color: { color: '#f59e0b' }, font: { color: '#fbbf24', strokeWidth: 0 }, dashes: true },
    ]);

    // ─── Network configuration ─────────────────────────────
    const container = document.getElementById('graph-container');
    const data = { nodes: nodes, edges: edges };
    const options = {
      physics: {
        forceAtlas2Based: {
          gravitationalConstant: -100,
          centralGravity: 0.01,
          springLength: 200,
          springConstant: 0.08
        },
        maxVelocity: 50,
        solver: 'forceAtlas2Based',
        timestep: 0.35,
        stabilization: { iterations: 150 }
      },
      interaction: {
        hover: true,
        tooltipDelay: 200,
        zoomView: true,
      },
      layout: {
        randomSeed: 42 // Keep it mostly stable
      }
    };

    const network = new vis.Network(container, data, options);

    // ─── Events ────────────────────────────────────────────
    const panel = document.getElementById('info-panel');
    const panelTitle = document.getElementById('node-title');
    const panelDesc = document.getElementById('node-desc');

    network.on("selectNode", function (params) {
      if (params.nodes.length > 0) {
        const nodeId = params.nodes[0];
        const node = nodes.get(nodeId);
        
        panelTitle.innerText = node.label.replace(/<[^>]*>/g, '').replace(/[\n\r]/g, ' '); // Strip html tags if any
        panelDesc.innerText = node.desc || 'No description available.';
        panel.classList.add('active');
      }
    });

    network.on("deselectNode", function (params) {
      panel.classList.remove('active');
    });

  </script>
</body>
</html>
